name: Compile LaTeX CV

on:
  push:
    branches:
      - main
    paths:
      - '**.tex'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4

      - name: Compilar todos os .tex → PDF
        run: |
          for texfile in *.tex; do
            echo "Compilando: $texfile"
            docker run --rm \
              -v "$PWD":/workspace \
              -w /workspace \
              ghcr.io/xu-cheng/texlive-full:latest \
              latexmk -pdf -xelatex -interaction=nonstopmode "$texfile"
            echo "✓ ${texfile%.tex}.pdf gerado"
          done

      - name: Deletar release anterior (latest)
        run: |
          gh release delete latest --cleanup-tag --yes || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publicar PDFs como Release
        run: |
          gh release create latest *.pdf \
            --title "Currículos — $(date +'%d/%m/%Y')" \
            --notes "Gerado automaticamente via GitHub Actions." \
            --latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
