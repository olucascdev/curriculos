name: Compile LaTeX CV

on:
  push:
    branches:
      - main
    paths:
      - '**.tex'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4

      - name: Compilar todos os .tex → PDF
        run: |
          mkdir -p docs
          for texfile in *.tex; do
            echo "Compilando: $texfile"
            docker run --rm \
              -v "$PWD":/workspace \
              -w /workspace \
              ghcr.io/xu-cheng/texlive-full:latest \
              latexmk -pdf -xelatex -interaction=nonstopmode "$texfile"
            pdfname="${texfile%.tex}.pdf"
            mv "$pdfname" "docs/$pdfname"
            echo "✓ $pdfname gerado"
          done

      - name: Commit e push dos PDFs gerados
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "ci: atualiza PDFs compilados [skip ci]"
          file_pattern: docs/*.pdf
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
